<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="320" height="100" rx="0" fill="#0D0F0E"/>

  <!-- ─── ICON (90x90 centered in left 100px) ─── -->
  <g transform="translate(5, 5)">
    <!-- Icon background -->
    <rect width="90" height="90" rx="16" fill="#111412"/>
    <rect x="1.2" y="1.2" width="87.6" height="87.6" rx="15" fill="none" stroke="#1A3C2E" stroke-width="1"/>

    <!-- Tree strokes -->
    <g stroke="#A8FF3E" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="45" y1="59" x2="45" y2="31"/>
      <line x1="45" y1="40" x2="24" y2="26"/>
      <line x1="45" y1="40" x2="66" y2="26"/>
      <line x1="45" y1="31" x2="45" y2="24"/>
      <line x1="24" y1="26" x2="12" y2="15"/>
      <line x1="24" y1="26" x2="33" y2="13"/>
      <line x1="66" y1="26" x2="57" y2="13"/>
      <line x1="66" y1="26" x2="78" y2="15"/>
      <line x1="45" y1="59" x2="28" y2="69"/>
      <line x1="45" y1="59" x2="45" y2="72"/>
      <line x1="45" y1="59" x2="62" y2="69"/>
      <line x1="28" y1="69" x2="16" y2="77"/>
      <line x1="62" y1="69" x2="74" y2="77"/>
    </g>

    <!-- Nodes — tips -->
    <g fill="#A8FF3E" filter="url(#glow)">
      <circle cx="12" cy="15" r="2.5"/>
      <circle cx="33" cy="13" r="2.5"/>
      <circle cx="45" cy="24" r="2.5"/>
      <circle cx="57" cy="13" r="2.5"/>
      <circle cx="78" cy="15" r="2.5"/>
      <circle cx="16" cy="77" r="2.5"/>
      <circle cx="45" cy="72" r="2.5"/>
      <circle cx="74" cy="77" r="2.5"/>
    </g>

    <!-- Nodes — junctions -->
    <g fill="#A8FF3E" opacity="0.7">
      <circle cx="24" cy="26" r="1.8"/>
      <circle cx="66" cy="26" r="1.8"/>
      <circle cx="45" cy="40" r="1.8"/>
      <circle cx="28" cy="69" r="1.8"/>
      <circle cx="45" cy="59" r="1.8"/>
      <circle cx="62" cy="69" r="1.8"/>
    </g>
  </g>

  <!-- ─── WORDMARK ─── -->
  <!-- NEXORA -->
  <text
    x="114" y="53"
    font-family="'Inter', 'Space Grotesk', 'Helvetica Neue', Arial, sans-serif"
    font-weight="700"
    font-size="30"
    fill="#F2F0EB"
    letter-spacing="3">NEXORA</text>

  <!-- IA — accent lime, tracked out -->
  <text
    x="116" y="74"
    font-family="'Inter', 'Space Grotesk', 'Helvetica Neue', Arial, sans-serif"
    font-weight="600"
    font-size="13"
    fill="#A8FF3E"
    letter-spacing="9">IA</text>

  <!-- Subtle divider between icon and text -->
  <line x1="106" y1="22" x2="106" y2="78" stroke="#1A3C2E" stroke-width="1"/>
</svg>
