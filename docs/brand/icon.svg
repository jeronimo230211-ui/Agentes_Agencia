<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#0D0F0E"/>
  <!-- Subtle emerald inner border -->
  <rect x="1.5" y="1.5" width="97" height="97" rx="19" fill="none" stroke="#1A3C2E" stroke-width="1.2"/>

  <!-- Tree — strokes -->
  <g stroke="#A8FF3E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Trunk -->
    <line x1="50" y1="65" x2="50" y2="34"/>
    <!-- Primary branches -->
    <line x1="50" y1="44" x2="27" y2="29"/>
    <line x1="50" y1="44" x2="73" y2="29"/>
    <!-- Center top branch -->
    <line x1="50" y1="34" x2="50" y2="27"/>
    <!-- Secondary branches — left -->
    <line x1="27" y1="29" x2="14" y2="17"/>
    <line x1="27" y1="29" x2="37" y2="15"/>
    <!-- Secondary branches — right -->
    <line x1="73" y1="29" x2="63" y2="15"/>
    <line x1="73" y1="29" x2="86" y2="17"/>
    <!-- Primary roots -->
    <line x1="50" y1="65" x2="31" y2="76"/>
    <line x1="50" y1="65" x2="50" y2="79"/>
    <line x1="50" y1="65" x2="69" y2="76"/>
    <!-- Secondary roots -->
    <line x1="31" y1="76" x2="18" y2="85"/>
    <line x1="69" y1="76" x2="82" y2="85"/>
  </g>

  <!-- Nodes — tips (branch ends) -->
  <g fill="#A8FF3E" filter="url(#glow)">
    <circle cx="14" cy="17" r="2.8"/>
    <circle cx="37" cy="15" r="2.8"/>
    <circle cx="50" cy="27" r="2.8"/>
    <circle cx="63" cy="15" r="2.8"/>
    <circle cx="86" cy="17" r="2.8"/>
    <circle cx="18" cy="85" r="2.8"/>
    <circle cx="50" cy="79" r="2.8"/>
    <circle cx="82" cy="85" r="2.8"/>
  </g>

  <!-- Nodes — junctions (smaller) -->
  <g fill="#A8FF3E" opacity="0.75">
    <circle cx="27" cy="29" r="2"/>
    <circle cx="73" cy="29" r="2"/>
    <circle cx="50" cy="44" r="2"/>
    <circle cx="31" cy="76" r="2"/>
    <circle cx="50" cy="65" r="2"/>
    <circle cx="69" cy="76" r="2"/>
  </g>
</svg>
